<div>
  <h2>Dashboard</h2>
  @if (dashboardData) {
    <div>
      <p>Tickets Bought: {{dashboardData.ticketsBought}}</p>
      <p>Tickets Sold: {{dashboardData.ticketsSold}}</p>
      <p>Available Tickets: {{dashboardData.availableTickets}}</p>
    </div>
  }
  @if (!dashboardData) {
    <div>
      <p>Loading dashboard data...</p>
    </div>
  }
</div>
